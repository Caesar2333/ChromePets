<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Browser Pet Playground</title>
  </head>
  <body>
    <main class="playground">
      <section class="stage" aria-label="Pet preview">
        <div class="pet-shell">
          <div id="pet-sprite" class="pet-sprite"></div>
        </div>
      </section>

      <aside class="panel">
        <header>
          <h1>Pet Playground</h1>
          <p id="pet-name">Loading pet package...</p>
        </header>

        <div id="state-buttons" class="state-grid"></div>

        <label class="scale-control" for="scale">
          <span>Scale</span>
          <input id="scale" type="range" min="0.5" max="2" step="0.1" value="1" />
        </label>

        <dl class="stats">
          <div>
            <dt>currentState</dt>
            <dd id="current-state">idle</dd>
          </div>
          <div>
            <dt>currentFrame</dt>
            <dd id="current-frame">0</dd>
          </div>
          <div>
            <dt>fps / current duration</dt>
            <dd id="timing">0 fps / 0 ms</dd>
          </div>
          <div>
            <dt>spritesheet size</dt>
            <dd id="spritesheet-size">-</dd>
          </div>
          <div>
            <dt>scale</dt>
            <dd id="scale-value">1.0x</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
